#
# xcodegen spec for the SimEnclave end-to-end example. Generate the project with
# `xcodegen generate` (run it from examples/native). A Simulator build needs no code signing.
#
# Two targets share one Secure Enclave model (Shared/SEConsole.swift): an iOS app and a watchOS
# app. The SecKey code is identical across platforms, so only the UI differs. Neither target links
# the interposer; the SimEnclave helper arms the booted simulator, so any app it launches signs
# against the host Mac SEP.

name: SecureEnclaveExample
options:
  bundleIdPrefix: dev.simenclave
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

targets:
  SecureEnclaveExample:
    type: application
    platform: iOS
    sources:
      # The shared Secure Enclave model: generate, sign, verify, keychain. The watch target
      # builds the same file.
      - Shared
      - Sources
      # The brand wordmark lockup (light + dark), used in the navigation header.
      - Assets.xcassets
      # The dev variant of the app icon: the canonical Icon Composer bundle in /assets.
      # actool compiles it and the build merges its CFBundleIconName into the generated plist.
      - path: ../../assets/simenclave-dev.icon
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.simenclave.SecureEnclaveExample
        ASSETCATALOG_COMPILER_APPICON_NAME: simenclave-dev
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: SE Example
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: "NO"

  SecureEnclaveWatchExample:
    type: application
    platform: watchOS
    sources:
      # The same shared Secure Enclave model, plus the watch-only UI.
      - Shared
      - Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.simenclave.SecureEnclaveWatchExample
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: SE Watch
        # The single-target watch app marker, so the Simulator runs it standalone, no companion.
        INFOPLIST_KEY_WKApplication: "YES"
        TARGETED_DEVICE_FAMILY: "4"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: "NO"
