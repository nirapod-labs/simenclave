# XcodeGen spec for a signed, notarized SimEnclave helper .app bundle, for
# distribution (M5). M1 ships the menubar as the ad-hoc `simenclave-menubar`
# SwiftPM accessory app, which needs no entitlement (the SE works ad-hoc). This
# bundle adds com.apple.application-identifier (Keychain Sharing) for keychain
# persistence (M3) and Developer ID signing for distribution, both filled in at M5.
name: SimEnclaveHelper
options:
  bundleIdPrefix: com.nirapod.simenclave
  deploymentTarget:
    macOS: "13.0"
targets:
  SimEnclaveHelper:
    type: application
    platform: macOS
    sources:
      - path: Sources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nirapod.simenclave.helper
        INFOPLIST_KEY_LSUIElement: true
        MACOSX_DEPLOYMENT_TARGET: "13.0"
